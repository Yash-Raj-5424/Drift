services:
  postgres:
    image: postgres:17
    container_name: drift-db

    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

    ports:
      - "5432:5432"

    volumes:
      - drift-db-data:/var/lib/postgresql/data

volumes:
  drift-db-data: